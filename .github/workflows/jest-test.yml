name: Jest-test

on:
  - push

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14.x]

    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: make install
      - run: make lint
      - run: make test
        env:
          TEST_COVERAGE_ID: ${{ secrets.TEST_COVERAGE_ID }}
        with:
          coverageCommand: make test-coverage
          debug: true
